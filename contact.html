<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — Nut-Free Bakery</title>

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond&family=Jost&display=swap" rel="stylesheet">
</head>

<body>

    <header>
        <div class="header-inner">
            <nav class="nav-left">
                <a href="index.html">Home</a>
                <a href="shop.html">Shop</a>
            </nav>

            <div class="logo">
                <span class="logo-name">ZBestGoodies</span>
            </div>

            <div class="nav-right">
                <div class="nav-right-links">
                    <a href="index.html#about-anchor">Our Story</a>
                    <a class="active" href="contact.html">Contact</a>
                </div>
            </div>
        </div>
    </header>

    <div class="page-hero">
        <span class="tag">We'd love to hear from you</span>
        <h1>Get in Touch</h1>
    </div>

    <div class="contact-inner">

        <!-- FORM -->
        <div class="contact-form-section">
            <h2>Send a Message</h2>

            <div class="form-row">
                <div class="field"><label>First Name</label><input type="text"></div>
                <div class="field"><label>Last Name</label><input type="text"></div>
            </div>

            <div class="field"><label>Email</label><input type="email"></div>

            <div class="field">
                <label>Subject</label>
                <select>
                    <option>General Inquiry</option>
                    <option>Order Question</option>
                </select>
            </div>

            <div class="field"><label>Message</label><textarea></textarea></div>

            <button class="btn-send" onclick="sendMessage()">Send Message →</button>
        </div>

        <!-- INFO -->
        <div class="contact-info-section">
            <h2>Contact Info</h2>

            <div class="info-card">
                <div class="info-icon">📞</div>
                <div>
                    <div class="info-lbl">Phone</div>
                    <div class="info-val">(103) 455-2090</div>
                </div>
            </div>

            <div class="info-card">
                <div class="info-icon">✉️</div>
                <div>
                    <div class="info-lbl">Email</div>
                    <div class="info-val">info@nutfreebakery.com</div>
                </div>
            </div>

        </div>

    </div>

    <footer>
        <div class="footer-grid">
            <div class="f-brand">
                <span class="logo-name">Nut-Free Bakery</span>
            </div>
        </div>
    </footer>

    <div class="toast" id="toast"></div>

    <script src="script.js"></script>
</body>

</html>
