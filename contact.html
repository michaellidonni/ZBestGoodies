<!doctype html>
<html lang="en">

<head>
    <title>Contact</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <nav class="navbar navbar-expand-lg navbar-dark">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">ZBestGoodies</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="index.html">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="shop.html">Shop</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="contact.html">Contact</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container my-5">
        <h2 class="text-center mb-4 section-title">Get in Touch With Us</h2>

        <div class="row g-4">
            <div class="col-md-6">
                <form class="p-4 shadow rounded bg-white">
                    <input class="form-control mb-3" type="text" placeholder="Name">
                    <input class="form-control mb-3" type="email" placeholder="Email">
                    <textarea class="form-control mb-3" placeholder="Message"></textarea>
                    <button class="btn custom-btn w-100">Send Message</button>
                </form>
            </div>

            <div class="col-md-6">
                <div class="p-4 bg-white shadow rounded">
                    <h5>Contact Info</h5>
                    <p>Phone: (123) 456-7890</p>
                    <p>Email: placeholder@gmail.com</p>
                    <p>Address: 123 Placeholder Lane</p>
                    <p>Hours: Mon–Fri: 9am–4pm</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="text-center py-3 custom-footer">
        © 2026 Nut-Free Bakery
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"></script>
</body>

</html>
